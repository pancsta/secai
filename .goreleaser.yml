  -
    id: "cook"
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
      - SECAI_ID=aigent-cook
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./examples/cook/cmd
    binary: aigent-cook
    hooks:
      pre:
        - mkdir -p ./tmp/cook
        - cp -f ./examples/cook/config.tpl.kdl ./tmp/cook/config.kdl

archives:
#  TODO update
#  -
#    id: "aigent-research"
#    format: tar.gz
#    name_template: "aigent-research_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
#    # dont add readmes etc
#    files: [""]
#    builds:
#      - research

  -
    id: "aigent-cook"
    format: zip
    name_template: "aigent-cook_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - 'LICENSE.md'
      - src: 'tmp/cook/config.kdl'
        dst: "."
        strip_parent: true
      - src: 'examples/cook/README.md'
        dst: '.'
        strip_parent: true
    wrap_in_directory: true
    builds:
      - cook

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: pancsta
    name: secai
  draft: true
  replace_existing_draft: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^refactor:'
      - '^style:'
      - '^ci:'
      - '^perf:'
      - '^revert:'
snapshot:
  name_template: "{{ .Tag }}-next"