name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: Set up Go
        uses: actions/setup-go@v4

      # deps
      -
        name: Install Task
        run: ./scripts/deps.sh
      -
        name: Install dependencies
        run: task --dir examples/cook install-deps

      # build
      -
        name: WASM
        run: task --dir examples/cook build-wasm
      -
        name: Gen license
        run: task gen-license

      # release
      -
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
